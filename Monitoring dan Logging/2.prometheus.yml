global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'fraud_model_exporter'
    static_configs:
      - targets: ['host.docker.internal:5001']
        labels:
          instance: 'fraud-model'
          env: 'local'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
