apiVersion: 1

groups:
  - orgId: 1
    name: Fraud Model Alerts
    folder: Fraud Alerts
    interval: 1m
    rules:
      - uid: high_error_rate
        title: High Error Rate (> 5%)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: sum(rate(http_error_responses_total[5m])) / sum(rate(http_requests_total[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
            relativeTimeRange:
              from: 600
              to: 0
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
            relativeTimeRange:
              from: 600
              to: 0
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: High error rate detected on Fraud API
        labels:
          severity: critical

      - uid: high_latency
        title: High Prediction Latency (> 0.5s)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(model_prediction_latency_seconds_bucket[5m])) by (le))
              intervalMs: 1000
              maxDataPoints: 43200
            relativeTimeRange:
              from: 600
              to: 0
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions:
                - evaluator:
                    type: gt
                    params: [0.5]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
            relativeTimeRange:
              from: 600
              to: 0
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: Prediction P95 latency is too high
        labels:
          severity: warning

      - uid: data_drift
        title: Data Drift Detected (> 0.8)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: data_drift_score
              intervalMs: 1000
              maxDataPoints: 43200
            relativeTimeRange:
              from: 600
              to: 0
          - refId: B
            datasourceUid: "__expr__"
            model:
              type: reduce
              expression: A
              reducer: last
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
            relativeTimeRange:
              from: 600
              to: 0
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: High data drift score detected
        labels:
          severity: warning